services:
  - type: worker
    name: sentoria-tickets
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
